runtime: {}
telemetry:
  system_log:
    level: info
security: {}
http: {}
traffic: {}
edges:
  - kind: reverse
    name: ipc-gateway
    listen: 127.0.0.1:19090
    routes:
      - name: function
        match:
          path: [/api/*]
        target:
          type: ipc
          endpoint: unix:///run/qpxf.sock
          mode: shm
          timeout_ms: 3000
          body:
            max_request_bytes: 10485760
            max_response_bytes: 10485760
