[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
skip = [
  { crate = "bitflags@1.3.2", reason = "notify 6 pulls inotify 0.9 on Linux; notify upgrade is tracked separately to avoid watcher behavior regression" },
  { crate = "getrandom@0.2.17", reason = "ring and rand_core 0.6 transitively require getrandom 0.2" },
  { crate = "getrandom@0.3.4", reason = "quinn/rand 0.9 side of the graph uses getrandom 0.3 while tempfile/uuid use 0.4" },
  { crate = "hashbrown@0.16.1", reason = "wasmtime/cranelift 44 depends on hashbrown 0.16 while newer crates use 0.17" },
  { crate = "jni@0.21.1", reason = "quinn-proto depends on rustls-platform-verifier 0.6, which still uses jni 0.21 on Android" },
  { crate = "jni-sys@0.3.1", reason = "jni 0.21 transitive dependency retained by quinn-proto's verifier graph" },
  { crate = "linux-raw-sys@0.4.15", reason = "rustix 0.38 remains in transitive dependencies alongside rustix 1.x" },
  { crate = "mio@0.8.11", reason = "notify 6 uses mio 0.8 while tokio and workspace networking use mio 1.x" },
  { crate = "r-efi@5.3.0", reason = "getrandom 0.3 and 0.4 currently depend on different r-efi generations" },
  { crate = "rand@0.8.6", reason = "wasmtime-wasi cap-rand still depends on rand 0.8" },
  { crate = "rand_chacha@0.3.1", reason = "rand 0.8 transitive dependency retained by wasmtime-wasi cap-rand" },
  { crate = "rand_core@0.6.4", reason = "rand 0.8/ring side of the graph still uses rand_core 0.6" },
  { crate = "rustix@0.38.44", reason = "system-interface and transitive tooling still depend on rustix 0.38 while newer crates use rustix 1.x" },
  { crate = "rustls-platform-verifier@0.6.2", reason = "quinn-proto 0.11 depends on verifier 0.6; direct TLS stack uses verifier 0.7 where applicable" },
  { crate = "syn@1.0.109", reason = "legacy proc-macro dependencies still require syn 1 while workspace macros use syn 2" },
  { crate = "thiserror@1.0.69", reason = "metrics-exporter-prometheus/pcap-file/witx still depend on thiserror 1" },
  { crate = "thiserror-impl@1.0.69", reason = "thiserror 1 transitive proc-macro retained by legacy transitive dependencies" },
  { crate = "wasm-encoder@0.246.2", reason = "wasmtime 44 uses wasm-encoder 0.246 while wast 251 uses 0.251" },
  { crate = "wast@35.0.2", reason = "witx 0.9 retained by wasmtime-wasi uses old wast" },
  { crate = "winnow@0.7.15", reason = "toml 0.9 and toml_parser 1.1 currently depend on different winnow generations" },
  { crate = "wit-bindgen@0.51.0", reason = "wasmtime 44 and WIT tooling currently depend on distinct wit-bindgen generations" },
  { crate = "windows-sys@0.45.0", reason = "Android/JNI verifier transitive graph retains old windows-sys target support crates" },
  { crate = "windows-sys@0.48.0", reason = "transitive Windows support crates have not converged on a single windows-sys version" },
  { crate = "windows-sys@0.52.0", reason = "transitive Windows support crates have not converged on a single windows-sys version" },
  { crate = "windows-sys@0.59.0", reason = "transitive Windows support crates have not converged on a single windows-sys version" },
  { crate = "windows-sys@0.60.2", reason = "transitive Windows support crates have not converged on workspace windows-sys 0.61" },
  { crate = "windows-targets@0.42.2", reason = "old windows-sys versions retain matching windows-targets generations" },
  { crate = "windows-targets@0.48.5", reason = "old windows-sys versions retain matching windows-targets generations" },
  { crate = "windows-targets@0.52.6", reason = "old windows-sys versions retain matching windows-targets generations" },
  { crate = "windows_aarch64_gnullvm@0.42.2", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_aarch64_gnullvm@0.48.5", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_aarch64_gnullvm@0.52.6", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_aarch64_msvc@0.42.2", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_aarch64_msvc@0.48.5", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_aarch64_msvc@0.52.6", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_i686_gnu@0.42.2", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_i686_gnu@0.48.5", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_i686_gnu@0.52.6", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_i686_gnullvm@0.52.6", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_i686_msvc@0.42.2", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_i686_msvc@0.48.5", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_i686_msvc@0.52.6", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_gnu@0.42.2", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_gnu@0.48.5", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_gnu@0.52.6", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_gnullvm@0.42.2", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_gnullvm@0.48.5", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_gnullvm@0.52.6", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_msvc@0.42.2", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_msvc@0.48.5", reason = "old windows-targets generation retained transitively" },
  { crate = "windows_x86_64_msvc@0.52.6", reason = "old windows-targets generation retained transitively" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
