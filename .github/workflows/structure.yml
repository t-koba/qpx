name: structure

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure:
    name: structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: structure checks
        run: cargo xtask structure
