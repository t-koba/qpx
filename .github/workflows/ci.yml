name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: '17 19 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.87
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv-1.87
      - name: check workspace on MSRV
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo check --workspace --locked

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: crate-ci/typos@v1.43.5

  sensitive_artifacts:
    name: sensitive artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: reject local paths, secrets, and runtime artifacts
        run: bash ./scripts/check-sensitive-artifacts.sh

  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --locked --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  public_api:
    name: public-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: public-api
      - name: install cargo-public-api
        run: cargo install cargo-public-api --locked
      - name: check public API fingerprints
        run: bash ./scripts/check-public-api.sh

  machete:
    name: unused-dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: bnjbvr/cargo-machete@v0.6.0

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: llvm-cov
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: collect coverage
        run: cargo llvm-cov --workspace --locked --fail-under-lines 20

  e2e_tests:
    name: e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd lsof curl openssl procps
      - name: build qpxd (no warnings)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build -p qpxd --locked
      - name: run control-plane e2e
        run: bash ./scripts/e2e-control-plane.sh
      - name: run control-plane soak e2e
        run: bash ./scripts/e2e-control-plane-soak.sh
      - name: run sample-config e2e
        run: bash ./scripts/e2e-config-samples.sh
      - name: run local-response e2e
        run: bash ./scripts/e2e-local-response.sh
      - name: run http2 e2e
        run: bash ./scripts/e2e-http2.sh

  e2e_control_plane_windows:
    name: control-plane e2e (windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build qpxd (no warnings)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build -p qpxd --locked
      - name: run control-plane e2e (windows)
        shell: pwsh
        run: ./scripts/e2e-control-plane.ps1

  perf_smoke:
    name: perf smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: perf smoke (release)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test -p qpxd --release --test perf_smoke --locked -- --nocapture
      - name: advanced transport perf (release)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test -p qpxd --release --test advanced_transport_perf --locked -- --nocapture

  nightly_perf_bench:
    name: nightly perf bench
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: criterion streaming throughput bench
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo bench -p qpxd --bench streaming_throughput --locked -- --sample-size 10

  config_samples:
    name: config samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssl
      - name: validate qpxd sample configs
        env:
          RUSTFLAGS: "-D warnings"
        run: bash ./scripts/check-config-samples.sh
      - name: audit qpxd sample use-case intent
        run: bash ./scripts/audit-config-usecases.sh
      - name: audit qpxd compiled sample behavior
        env:
          RUSTFLAGS: "-D warnings"
        run: bash ./scripts/audit-config-behavior.sh

  build_test:
    name: build/test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: windows-x86_64
            os: windows-2022
          - name: macos-aarch64
            os: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: build (no warnings)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build --workspace --all-targets --locked

      - name: test
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test --workspace --locked -- --test-threads=1

      - name: clippy (default features)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  release_target_preflight:
    name: release preflight (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            use_cross: false
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-preflight-${{ matrix.target }}
      - name: Install cross
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: build release targets (no warnings)
        env:
          RUSTFLAGS: "-D warnings"
          CARGO_TARGET_DIR: target/${{ matrix.target }}
          QPXD_SAMPLE_RUSTLS_FEATURES: qpxd/auth-digest,qpxd/auth-ldap
          QPXD_SAMPLE_NATIVE_FEATURES: auth-digest,auth-ldap
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --workspace --release --locked --target ${{ matrix.target }} --features "${QPXD_SAMPLE_RUSTLS_FEATURES}"
          else
            cargo build --workspace --release --locked --target ${{ matrix.target }} --features "${QPXD_SAMPLE_RUSTLS_FEATURES}"
          fi

          case "${{ matrix.target }}" in
            aarch64-apple-darwin|x86_64-pc-windows-msvc)
              cargo build -p qpxd --release --locked --target ${{ matrix.target }} --no-default-features --features "${QPXD_SAMPLE_NATIVE_FEATURES}"
              ;;
          esac

  clippy_feature_matrix:
    name: clippy (feature matrix, ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: clippy (all valid feature combinations)
        env:
          RUSTFLAGS: "-D warnings"
        run: |
          set -euo pipefail

          run_clippy() {
            local pkg="$1"
            local features="${2:-}"

            if [[ -z "${features}" ]]; then
              echo "::group::cargo clippy -p ${pkg} --no-default-features"
              cargo clippy -p "${pkg}" --locked --all-targets --no-default-features -- -D warnings
              echo "::endgroup::"
              return 0
            fi

            echo "::group::cargo clippy -p ${pkg} --no-default-features --features ${features}"
            cargo clippy -p "${pkg}" --locked --all-targets --no-default-features --features "${features}" -- -D warnings
            echo "::endgroup::"
          }

          run_plain() {
            local pkg="$1"
            echo "::group::cargo clippy -p ${pkg}"
            cargo clippy -p "${pkg}" --locked --all-targets -- -D warnings
            echo "::endgroup::"
          }

          # qpx-core: tls backend (none|tls-rustls|tls-native) x ipc-support (on|off)
          for feats in \
            "" \
            "ipc-support" \
            "tls-rustls" \
            "tls-rustls,ipc-support" \
            "tls-native" \
            "tls-native,ipc-support"; do
            run_clippy qpx-core "${feats}"
          done

          # qpx-auth: explicit Basic / Digest / LDAP feature combinations
          for feats in \
            "" \
            "basic-auth" \
            "digest-auth" \
            "ldap-auth" \
            "ldap-auth,digest-auth"; do
            run_clippy qpx-auth "${feats}"
          done

          # qpx-acme: base or HTTP/3-enabled
          for feats in "" "http3"; do
            run_clippy qpx-acme "${feats}"
          done

          # qpxd:
          # - tls backend: none | tls-native | tls-rustls
          # - HTTP/3 defaults to h3; qpx takes precedence when both backend features are present
          # - mitm/acme require tls-rustls
          # - auth features are named auth-basic/auth-digest/auth-ldap
          for feats in \
            "" \
            "tls-native" \
            "tls-rustls" \
            "tls-rustls,auth-basic" \
            "tls-rustls,auth-digest" \
            "tls-rustls,auth-ldap" \
            "tls-native,auth-ldap" \
            "tls-rustls,mitm" \
            "tls-rustls,acme" \
            "tls-rustls,mitm,acme" \
            "http3-backend-h3" \
            "http3-backend-h3,mitm" \
            "http3-backend-h3,acme" \
            "http3-backend-h3,mitm,acme" \
            "http3-backend-qpx" \
            "http3-backend-qpx,mitm" \
            "http3-backend-qpx,acme" \
            "http3-backend-qpx,mitm,acme" \
            "http3-backend-h3,http3-backend-qpx,mitm,acme"; do
            run_clippy qpxd "${feats}"
          done

          # qpxr / qpxc: tls backend (none|tls-rustls|tls-native)
          for pkg in qpxr qpxc; do
            for tls in "" "tls-rustls" "tls-native"; do
              run_clippy "${pkg}" "${tls}"
            done
          done

          # qpxf: wasm (on|off)
          run_clippy qpxf ""
          run_clippy qpxf "wasm"

          # featureless crates
          for pkg in qpx-wasm qpx-h3 qpx-observability xtask; do
            run_plain "${pkg}"
          done

  audit:
    name: dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - run: cargo audit
      - run: cargo deny check
