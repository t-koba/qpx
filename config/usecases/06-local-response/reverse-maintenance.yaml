state_dir: "${QPX_STATE_DIR:-~/.local/share/qpx}"
telemetry:
  system_log:
    level: info
    format: json
edges:
- kind: reverse
  name: reverse-maintenance
  listen: "${QPX_LR_REVERSE_LISTEN:-0.0.0.0:19181}"
  routes:
  - streaming_requirement: preferred
    match:
      host:
      - app.example.com
      path:
      - "/status"
      - "/healthz"
    target:
      type: local_response
      response:
        status: 200
        content_type: application/json
        body: '{"ok":true,"source":"qpx-reverse"}'
  - streaming_requirement: preferred
    match:
      host:
      - app.example.com
      path:
      - "/maintenance/*"
    target:
      type: local_response
      response:
        status: 503
        content_type: text/html; charset=utf-8
        body: "<html><body><h1>Maintenance</h1><p>Please retry later.</p></body></html>"
  - streaming_requirement: preferred
    match:
      host:
      - app.example.com
    timeout_ms: 10000
    resilience:
      retry:
        attempts: 2
        backoff_ms: 100
    target:
      type: upstream
      upstreams:
      - http://10.10.0.11:8080
      - http://10.10.0.12:8080
      lb: round_robin
