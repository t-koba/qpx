state_dir: "${QPX_STATE_DIR:-~/.local/share/qpx}"
upstreams:
- name: corp-egress
  url: http://proxy.corp.example:3128
security:
  auth:
    users:
    - username: analyst
      password: change-me
edges:
- kind: forward
  name: authenticated-upstream-egress
  listen: 127.0.0.1:18084
  default_action:
    type: block
  rules:
  - name: direct-internal-services
    match:
      host:
      - "*.corp.internal"
      - metadata.internal
    auth:
      require:
      - local
    action:
      type: direct
  - name: proxy-authenticated-users
    match:
      host:
      - "*"
      method:
      - GET
      - POST
      - CONNECT
    auth:
      require:
      - local
    action:
      type: proxy
      upstream: corp-egress
