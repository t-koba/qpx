listeners:
- name: selective-mitm-forward
  listen: 127.0.0.1:18084
  default_action:
    type: block
  tls_inspection:
    enabled: true
    verify_upstream: true
    verify_exceptions:
    - '*.internal.example.com'
  rules:
  - name: inspect-work-sites
    match:
      src_ip:
      - 127.0.0.1/32
      - ::1/128
      sni:
      - '*.work.example.com'
      - api.partner.example
    action:
      type: inspect
  - name: direct-banking-sites
    match:
      src_ip:
      - 127.0.0.1/32
      - ::1/128
      sni:
      - '*.bank.example'
      - '*.payments.example'
    action:
      type: direct
  - name: block-known-bad
    match:
      src_ip:
      - 127.0.0.1/32
      - ::1/128
      host:
      - '*.botnet.invalid'
      - '*.malware.test'
    action:
      type: block
  - name: allow-loopback
    match:
      src_ip:
      - 127.0.0.1/32
      - ::1/128
      host:
      - '*'
    action:
      type: direct
  mode: forward
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
