state_dir: "${QPX_STATE_DIR:-~/.local/share/qpx}"
edges:
- kind: reverse
  name: reverse-websocket-upstream
  listen: 0.0.0.0:19446
  routes:
  - name: chat-ws
    streaming_requirement: preferred
    match:
      host:
      - chat.example.com
    timeout_ms: 60000
    resilience:
      retry:
        attempts: 1
        backoff_ms: 50
    health_check:
      interval_ms: 5000
      timeout_ms: 1000
      fail_threshold: 3
      cooldown_ms: 30000
      http:
        path: "/healthz"
        method: GET
        expected_status:
        - 200
        - 204
    target:
      type: upstream
      upstreams:
      - ws://10.50.0.10:8080
      - ws://10.50.0.11:8080
      lb: round_robin
  - name: events-wss
    streaming_requirement: preferred
    match:
      host:
      - events.example.com
    timeout_ms: 60000
    resilience:
      retry:
        attempts: 1
        backoff_ms: 50
    upstream_trust:
      san_dns:
      - events-backend.internal.example.com
    health_check:
      interval_ms: 5000
      timeout_ms: 1000
      fail_threshold: 3
      cooldown_ms: 30000
      http:
        path: "/healthz"
        method: GET
        expected_status:
        - 200
        - 204
    target:
      type: upstream
      upstreams:
      - wss://events-backend.internal.example.com:8443
      lb: round_robin
