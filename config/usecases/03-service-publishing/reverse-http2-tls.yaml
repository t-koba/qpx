reverse:
- name: reverse-h2-tls
  listen: 0.0.0.0:443
  tls:
    certificates:
    - sni: app.example.com
      cert: ${QPX_TLS_CERT:-/etc/qpx/certs/app.example.com.crt}
      key: ${QPX_TLS_KEY:-/etc/qpx/certs/app.example.com.key}
  routes:
  - match:
      host:
      - app.example.com
    timeout_ms: 15000
    lb: round_robin
    resilience:
      retry:
        attempts: 2
        backoff_ms: 50
    upstreams:
    - https://10.0.0.10:8443
    - https://10.0.0.11:8443
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
