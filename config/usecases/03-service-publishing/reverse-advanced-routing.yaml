reverse:
- name: reverse-advanced-routing
  listen: 0.0.0.0:19083
  routes:
  - name: api-routing
    match:
      host:
      - api.example.com
      path:
      - /api/*
    headers:
      request_set:
        X-Proxy: qpx
      response_set:
        X-Proxy-Handled: qpx
    path_rewrite:
      strip_prefix: /api
      add_prefix: /v1
      regex:
        pattern: ^/v1/legacy/(.*)$
        replace: /v1/$1
    resilience:
      max_upstream_concurrency: 128
      retry:
        attempts: 2
        backoff_ms: 100
      outlier_detection:
        consecutive_failures:
          http_5xx: 2
          timeouts: 2
          connect_errors: 2
      ejection:
        max_ms: 30000
    mirrors:
    - name: shadow
      percent: 5
      upstreams:
      - http://10.40.0.50:8080
    affinity:
      key: header
      header: x-canary-key
    http:
      response_rules:
      - name: synthesize-maintenance
        match:
          response_status:
          - '503'
        effects:
          local_response:
            status: 200
            content_type: application/json
            body: '{"status":"maintenance","source":"qpx-local"}'
          headers:
            response_set:
              Cache-Control: no-store
              X-Qpx-Policy: maintenance-fallback
          cache:
            bypass: true
          mirror:
            enabled: false
          tags:
          - maintenance-fallback
      - name: annotate-5xx
        match:
          response_status:
          - 500-599
        effects:
          headers:
            response_add:
              X-Upstream-Class: error
          mirror:
            enabled: false
          tags:
          - upstream-error
    lb: round_robin
    timeout_ms: 10000
    health_check:
      interval_ms: 5000
      timeout_ms: 1000
      fail_threshold: 3
      cooldown_ms: 30000
      http:
        path: /healthz
        method: GET
        expected_status:
        - 200
        - 204
    backends:
    - name: stable
      weight: 90
      upstreams:
      - http://10.40.0.11:8080
      - http://10.40.0.12:8080
    - name: canary
      weight: 10
      upstreams:
      - http://10.40.0.99:8080
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
