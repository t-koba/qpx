reverse:
- name: reverse-tls-acme
  listen: 0.0.0.0:19443
  tls:
    certificates:
    - sni: shop.example.com
    - sni: cdn.example.com
  routes:
  - match:
      host:
      - shop.example.com
    timeout_ms: 20000
    lb: round_robin
    resilience:
      retry:
        attempts: 2
        backoff_ms: 100
    upstreams:
    - http://10.30.0.21:8080
    - http://10.30.0.22:8080
  - match:
      host:
      - cdn.example.com
    timeout_ms: 10000
    lb: round_robin
    resilience:
      retry:
        attempts: 1
        backoff_ms: 50
    upstreams:
    - http://10.30.0.31:8080
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
acme:
  enabled: true
  terms_of_service_agreed: true
  email: ${QPX_ACME_EMAIL:-ops@example.invalid}
  directory_url: ${QPX_ACME_DIRECTORY_URL:-https://acme-staging-v02.api.letsencrypt.org/directory}
  http01_listen: 0.0.0.0:80
  renew_before_days: 30
