state_dir: "${QPX_STATE_DIR:-~/.local/share/qpx}"
edges:
- kind: reverse
  name: reverse-tls-native-pkcs12
  listen: 0.0.0.0:19450
  tls:
    certificates:
    - sni: shop.example.com
      pkcs12: "${QPX_TLS_PKCS12:-/etc/qpx/tls/shop.example.com.p12}"
      pkcs12_password_env: QPX_TLS_PKCS12_PASSWORD
  routes:
  - streaming_requirement: preferred
    match:
      host:
      - shop.example.com
    timeout_ms: 20000
    resilience:
      retry:
        attempts: 2
        backoff_ms: 100
    target:
      type: upstream
      upstreams:
      - http://10.30.0.21:8080
      - http://10.30.0.22:8080
      lb: round_robin
