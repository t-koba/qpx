reverse:
- name: reverse-lb-retry
  listen: 0.0.0.0:19081
  routes:
  - name: api-service
    match:
      host:
      - api.example.com
      path:
      - /v1/*
      - /v2/*
      method:
      - GET
      - POST
      - PUT
      - DELETE
    lifecycle:
      warmup_ms: 3000
      slow_start_ms: 15000
      drain_timeout_ms: 10000
    lb: round_robin
    resilience:
      retry:
        attempts: 3
        backoff_ms: 200
      max_upstream_concurrency: 256
      outlier_detection:
        consecutive_failures:
          http_5xx: 3
          timeouts: 2
          connect_errors: 2
        latency:
          p95_ms: 1500
      ejection:
        max_ms: 30000
    timeout_ms: 30000
    health_check:
      interval_ms: 5000
      timeout_ms: 1000
      fail_threshold: 3
      cooldown_ms: 30000
      http:
        path: /healthz
        method: GET
        expected_status:
        - 200
        - 204
    upstreams:
    - http://10.20.0.11:8080
    - http://10.20.0.12:8080
    - http://10.20.0.13:8080
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
