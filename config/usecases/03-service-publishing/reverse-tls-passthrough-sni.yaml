state_dir: "${QPX_STATE_DIR:-~/.local/share/qpx}"
edges:
- kind: reverse
  name: reverse-tls-passthrough
  listen: 0.0.0.0:19444
  tls:
    certificates:
    - sni: fallback.example.com
      cert: "${QPX_TLS_CERT:-/etc/qpx/certs/fallback.example.com.crt}"
      key: "${QPX_TLS_KEY:-/etc/qpx/certs/fallback.example.com.key}"
  tls_passthrough_routes:
  - match:
      sni:
      - db.example.com
    upstreams:
    - 10.40.0.10:5432
    lb: round_robin
    resilience:
      retry:
        attempts: 1
        backoff_ms: 10
    timeout_ms: 5000
  routes:
  - streaming_requirement: preferred
    match:
      host:
      - fallback.example.com
    timeout_ms: 15000
    resilience:
      retry:
        attempts: 2
        backoff_ms: 100
    target:
      type: upstream
      upstreams:
      - http://10.40.0.20:8080
      lb: round_robin
