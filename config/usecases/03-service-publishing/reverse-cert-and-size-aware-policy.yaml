# Advanced matcher sample for reverse publishing.
# `client_cert` is populated on TLS-terminated downstream requests when
# `tls.client_ca` is configured. `upstream_cert` and `response_size` are
# available to reverse `response_rules`.
reverse:
- name: reverse-cert-and-size-aware
  listen: 0.0.0.0:19451
  tls:
    client_ca: ${QPX_TLS_CLIENT_CA:-/etc/qpx/client-ca.pem}
    certificates:
    - sni: uploads.example.com
      cert: ${QPX_TLS_CERT:-/etc/qpx/certs/uploads.example.com.crt}
      key: ${QPX_TLS_KEY:-/etc/qpx/certs/uploads.example.com.key}
  routes:
  - name: uploads
    match:
      host:
      - uploads.example.com
      method:
      - POST
      - PUT
      http_version:
      - HTTP/2
      - HTTP/3
      request_size:
      - '>=1M'
      client_cert:
        present: true
        san_dns:
        - uploader.example.com
    timeout_ms: 45000
    upstream_trust:
      san_dns:
      - uploads-backend.internal.example.com
    http:
      response_rules:
      - name: mark-large-certified-response
        match:
          response_size:
          - '>=256K'
          upstream_cert:
            present: true
            san_dns:
            - uploads-backend.internal.example.com
        effects:
          headers:
            response_add:
              X-Transfer-Profile: large-certified
          retry:
            suppress: true
          tags:
          - large-upload
    upstreams:
    - https://uploads-backend.internal.example.com:9443
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
