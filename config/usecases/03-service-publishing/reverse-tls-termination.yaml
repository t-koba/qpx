reverse:
- name: reverse-tls-termination
  listen: 0.0.0.0:19443
  tls:
    certificates:
    - sni: shop.example.com
      cert: ${QPX_TLS_CERT:-/etc/qpx/certs/shop.example.com.crt}
      key: ${QPX_TLS_KEY:-/etc/qpx/certs/shop.example.com.key}
    - sni: cdn.example.com
      cert: ${QPX_TLS_CERT_ALT:-/etc/qpx/certs/cdn.example.com.crt}
      key: ${QPX_TLS_KEY_ALT:-/etc/qpx/certs/cdn.example.com.key}
  routes:
  - match:
      host:
      - shop.example.com
    timeout_ms: 20000
    lb: round_robin
    resilience:
      retry:
        attempts: 2
        backoff_ms: 100
    upstreams:
    - http://10.30.0.21:8080
    - http://10.30.0.22:8080
  - match:
      host:
      - cdn.example.com
    timeout_ms: 10000
    lb: round_robin
    resilience:
      retry:
        attempts: 1
        backoff_ms: 50
    upstreams:
    - http://10.30.0.31:8080
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
