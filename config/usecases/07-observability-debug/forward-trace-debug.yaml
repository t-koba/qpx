state_dir: "${QPX_STATE_DIR:-~/.local/share/qpx}"
runtime:
  trace_enabled: true
  trace_reflect_all_headers: false
telemetry:
  system_log:
    level: info
    format: json
edges:
- kind: forward
  name: forward-trace-debug
  listen: 127.0.0.1:18087
  default_action:
    type: block
  rules:
  - name: allow-loopback-trace
    match:
      src_ip:
      - 127.0.0.1/32
      - "::1/128"
      host:
      - trace.local
      method:
      - TRACE
      - OPTIONS
      - GET
    action:
      type: direct
