state_dir: "${QPX_STATE_DIR:-~/.local/share/qpx}"
telemetry:
  system_log:
    level: info
    format: json
caches:
- name: module-cache
  kind: redis
  endpoint: redis://127.0.0.1:6379/7
  timeout_ms: 1200
  max_object_bytes: 2097152
edges:
- kind: forward
  name: modules-forward
  listen: 127.0.0.1:18097
  default_action:
    type: block
  rules:
  - name: allow-loopback
    match:
      src_ip:
      - 127.0.0.1/32
      - "::1/128"
      host:
      - app.example.com
    action:
      type: direct
  cache:
    enabled: true
    backend: module-cache
    namespace: modules-forward
    default_ttl_secs: 60
    max_object_bytes: 2097152
  http_modules:
  - type: cache_purge
    id: forward-cache-purge
    order: -100
    settings:
      methods:
      - PURGE
      - DELETE
      response_status: 202
      response_body: cache purge queued
      response_headers:
        X-Cache-Purge: modules-forward
  - type: subrequest
    id: request-authz
    order: -20
    settings:
      name: request-authz
      phase: request_headers
      url: http://127.0.0.1:19091/check
      method: POST
      timeout_ms: 250
      max_response_bytes: 65536
      allowed_schemes:
      - http
      allowed_hosts:
      - 127.0.0.1
      pass_headers:
      - authorization
      - x-request-id
      request_headers:
        X-Module: request-authz
      copy_response_headers_to_request:
      - from: x-authz-user
        to: x-authenticated-user
      copy_response_headers_to_response:
      - from: x-authz-policy
        to: x-policy
      response_mode: return_on_error
  - type: response_compression
    id: forward-compress
    order: 50
    settings:
      min_body_bytes: 1024
      max_body_bytes: 1048576
      content_types:
      - application/json
      - text/plain
      gzip: true
      brotli: true
      zstd: false
      gzip_level: 6
      brotli_level: 5
- kind: reverse
  name: modules-reverse
  listen: 127.0.0.1:19497
  routes:
  - name: api
    match:
      host:
      - api.example.com
    http_modules:
    - type: subrequest
      id: response-metadata
      order: -10
      settings:
        name: response-metadata
        phase: response_headers
        url: http://127.0.0.1:19092/metadata
        timeout_ms: 200
        max_response_bytes: 65536
        allowed_schemes:
        - http
        allowed_hosts:
        - 127.0.0.1
        request_headers:
          X-Module: response-metadata
        copy_response_headers_to_response:
        - from: x-route-tag
          to: x-upstream-tag
        response_mode: ignore
    - type: response_compression
      id: reverse-compress
      order: 40
      settings:
        min_body_bytes: 2048
        max_body_bytes: 2097152
        content_types:
        - application/json
        gzip: true
        brotli: false
        zstd: true
        zstd_level: 9
    target:
      type: upstream
      upstreams:
      - http://127.0.0.1:19097
