# Build-time note:
# - Works with either HTTP/3 backend.
# - Choose `http3-backend-qpx` if this local-dev build also needs
#   WebTransport relay.
listeners:
- name: forward-http3-dev
  listen: 127.0.0.1:18080
  default_action:
    type: direct
  rules:
  - name: block-ads
    match:
      host:
      - '*.doubleclick.net'
      - '*.googlesyndication.com'
      - '*.adservice.google.com'
    action:
      type: block
  http3:
    enabled: true
    listen: 127.0.0.1:18443
    connect_udp:
      enabled: true
      idle_timeout_secs: 45
      max_capsule_buffer_bytes: 262144
  mode: forward
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
