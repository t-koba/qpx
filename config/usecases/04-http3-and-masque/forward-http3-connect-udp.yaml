# Build-time note:
# - Works with either HTTP/3 backend.
# - Choose `http3-backend-qpx` if the same daemon build also needs
#   WebTransport relay on the clean-room backend.
upstreams:
- name: masque-chain
  url: https://masque-gateway.example.com:443
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
listeners:
- name: forward-http3
  listen: ${QPX_FORWARD_LISTEN:-127.0.0.1:8080}
  default_action:
    type: block
  rules:
  - name: connect-udp-chain-corp
    match:
      method:
      - CONNECT
      host:
      - '*.corp.example'
    auth:
      require:
      - local
    action:
      type: proxy
      upstream: masque-chain
  - name: block-ads
    match:
      host:
      - '*.doubleclick.net'
      - '*.googlesyndication.com'
      - '*.adservice.google.com'
    action:
      type: block
  - name: http-require-auth
    match:
      method:
      - GET
      - HEAD
      - POST
      - PUT
      - DELETE
      - OPTIONS
    auth:
      require:
      - local
    action:
      type: direct
  - name: connect-require-auth
    match:
      method:
      - CONNECT
    auth:
      require:
      - local
    action:
      type: direct
  http3:
    enabled: true
    listen: ${QPX_FORWARD_H3_LISTEN:-127.0.0.1:8443}
    connect_udp:
      enabled: true
      idle_timeout_secs: 45
      max_capsule_buffer_bytes: 262144
  mode: forward
auth:
  users:
  - username: tester
    password: change-me
