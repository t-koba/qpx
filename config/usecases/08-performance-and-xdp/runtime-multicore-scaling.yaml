reverse:
- name: reverse-scale
  listen: 0.0.0.0:18443
  xdp:
    enabled: true
    metadata_mode: proxy-v2
    require_metadata: true
    trusted_peers:
    - 10.0.0.0/8
    - 192.168.0.0/16
  routes:
  - match:
      host:
      - '*.example.com'
    timeout_ms: 15000
    upstreams:
    - http://127.0.0.1:19092
runtime:
  worker_threads: 16
  max_blocking_threads: 512
  max_concurrent_connections: 8192
  max_h3_streams_per_connection: 256
  acceptor_tasks_per_listener: 16
  reuse_port: true
  tcp_backlog: 8192
  upstream_http_timeout_ms: 30000
  upstream_proxy_max_concurrent_per_endpoint: 512
  tls_peek_timeout_ms: 2000
  http_header_read_timeout_ms: 5000
  upgrade_wait_timeout_ms: 1500
  tunnel_idle_timeout_ms: 300000
  h3_read_timeout_ms: 10000
  max_h3_request_body_bytes: 16777216
  max_h3_response_body_bytes: 16777216
  max_reverse_retry_template_body_bytes: 8388608
listeners:
- name: forward-scale
  listen: 0.0.0.0:18080
  default_action:
    type: block
  rules:
  - name: corp-direct
    match:
      src_ip:
      - 10.0.0.0/8
      method:
      - GET
      - HEAD
      - CONNECT
    action:
      type: direct
  xdp:
    enabled: true
    metadata_mode: proxy-v2
    require_metadata: true
    trusted_peers:
    - 10.0.0.0/8
    - 192.168.0.0/16
  mode: forward
system_log:
  level: info
  format: json
