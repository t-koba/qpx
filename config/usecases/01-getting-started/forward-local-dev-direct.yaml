listeners:
- name: forward-dev-direct
  listen: 127.0.0.1:18070
  default_action:
    type: direct
  rules:
  - name: block-known-bad
    match:
      host:
      - '*.malware.test'
      - '*.phishing.test'
      - '*.botnet.invalid'
    action:
      type: block
  mode: forward
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
