listen: ${QPXF_UNIX_LISTEN}
workers: 4
max_connections: 64
max_requests_per_connection: 64
max_params_bytes: 1048576
max_stdin_bytes: 33554432
input_idle_timeout_ms: 30000
conn_idle_timeout_ms: 60000
# Repo-local fixture handlers keep `qpxf check --config ...` and the IPC sample
# e2e runnable out of the box. Override these env vars to point at your own
# CGI root or WASM module in real deployments.
handlers:
- match:
    path_prefix: /cgi-bin/
  backend:
    type: cgi
    root: ${QPXF_SAMPLE_CGI_ROOT:-config/usecases/12-ipc-gateway/assets/cgi}
    timeout_ms: 30000
    env_passthrough:
    - PATH
    - HOME
    max_stdout_bytes: 33554432
    max_stderr_bytes: 1048576
- match:
    path_prefix: /wasm/
  backend:
    type: wasm
    module: ${QPXF_SAMPLE_WASM_MODULE:-config/usecases/12-ipc-gateway/assets/wasm/echo.wat}
    precompile: true
    max_module_bytes: 134217728
    max_stdin_bytes: 33554432
    max_memory_mb: 128
    timeout_ms: 10000
    max_stdout_bytes: 33554432
    max_stderr_bytes: 1048576
