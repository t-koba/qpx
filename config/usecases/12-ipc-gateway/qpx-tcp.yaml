edges:
- kind: reverse
  name: ipc-gateway-tcp
  listen: "${QPX_IPC_GATEWAY_TCP_LISTEN:-127.0.0.1:18099}"
  routes:
  - name: function-executor
    match:
      path:
      - "/cgi-bin/*"
      - "/wasm/*"
    target:
      type: ipc
      endpoint: "${QPXF_TCP_LISTEN:-127.0.0.1:19090}"
      mode: tcp
      timeout_ms: 30000
  - name: not-found
    match:
      path:
      - "/*"
    target:
      type: local_response
      response:
        status: 404
        content_type: text/plain
        body: not found
