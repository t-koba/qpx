exporter:
  enabled: true
  shm_path: ''
  shm_size_mb: 16
  lossy: false
  max_queue_events: 4096
  capture:
    plaintext: true
    encrypted: true
    max_chunk_bytes: 16384
state_dir: ${QPX_STATE_DIR:-~/.local/share/qpx}
identity:
  proxy_name: qpx
  auth_realm: qpx
  metrics_prefix: qpx
  generated_user_agent: qpxd/0.1 (+https://example.com/qpx)
messages:
  blocked: blocked
  forbidden: forbidden
  trace_disabled: trace disabled
  proxy_error: proxy error
  proxy_auth_required: proxy auth required
  reverse_error: reverse error
  cache_miss: cache miss
  unsupported_ftp_method: unsupported ftp method
  ftp_disabled: ftp over http disabled
  connect_udp_disabled: connect-udp disabled
  upstream_connect_udp_failed: upstream connect-udp failed
runtime:
  worker_threads: 8
  max_blocking_threads: 256
  acceptor_tasks_per_listener: 8
  reuse_port: true
  tcp_backlog: 4096
  max_h3_streams_per_connection: 128
  # TRACE is opt-in. Keep header reflection sanitized unless you explicitly
  # need an all-header loop-back for diagnostics.
  trace_enabled: false
  trace_reflect_all_headers: false
  max_h3_request_body_bytes: 16777216
  max_h3_response_body_bytes: 16777216
  max_observed_request_body_bytes: 67108864
  max_observed_response_body_bytes: 67108864
  max_reverse_retry_template_body_bytes: 8388608
  upstream_http_timeout_ms: 30000
destination_resolution:
  defaults:
    precedence:
    - cert
    - sni
    - host
    - ip
    - tls_fingerprint
    - heuristic
    conflict_mode: prefer_precedence
    merge_mode: strongest_per_dimension
    min_confidence:
      category: 80
      reputation: 80
      application: 40
http_guard_profiles:
- name: strict-json-api
  normalize:
    path: true
    query: true
    headers: true
  protocol_safety:
    smuggling: true
    invalid_framing: true
  limits:
    header_count: 64
    header_bytes: 16384
    path_bytes: 2048
    query_pairs: 32
    query_key_bytes: 128
    query_value_bytes: 1024
    body_bytes: 1048576
  json:
    max_depth: 16
    max_fields: 256
  multipart:
    max_parts: 24
    max_name_bytes: 128
    max_filename_bytes: 256
# HTTP/3 backend choice is build-time only:
# - http3-backend-h3: default upstream-h3 backend for standard HTTP/3,
#   CONNECT-UDP / MASQUE, and non-WebTransport extended CONNECT
# - http3-backend-qpx: clean-room backend for reverse terminate plus the
#   full QPX-owned advanced HTTP/3 surface, including CONNECT-UDP / MASQUE,
#   generic extended CONNECT, and WebTransport relay
reverse:
- name: site
  listen: 127.0.0.1:443
  tls:
    certificates:
    - sni: example.com
      cert: ${QPX_TLS_CERT:-/etc/qpx/certs/example.com.crt}
      key: ${QPX_TLS_KEY:-/etc/qpx/certs/example.com.key}
  xdp:
    enabled: false
    metadata_mode: proxy-v2
    require_metadata: true
    trusted_peers:
    - 127.0.0.1/32
  enforce_sni_host_match: true
  sni_host_exceptions:
  - '*.monitoring.example.com'
  connection_filter:
  - name: drop-known-bad-source
    match:
      src_ip:
      - 203.0.113.0/24
      dst_port:
      - 443
    action:
      type: block
  routes:
  - name: app
    match:
      host:
      - example.com
    destination_resolution:
      precedence:
      - cert
      - sni
      - host
      - ip
      - tls_fingerprint
      - heuristic
    http_guard_profile: strict-json-api
    lifecycle:
      warmup_ms: 5000
      slow_start_ms: 30000
      drain_timeout_ms: 15000
    lb: round_robin
    affinity:
      key: cookie
      cookie: session
    resilience:
      retry:
        attempts: 2
        backoff_ms: 100
      max_upstream_concurrency: 256
      outlier_detection:
        consecutive_failures:
          http_5xx: 3
          timeouts: 2
          resets: 2
        latency:
          p95_ms: 1500
      ejection:
        max_ms: 30000
    timeout_ms: 30000
    upstream_trust:
      issuer:
      - Corp Issuer
      san_dns:
      - app.internal.example.com
      client_cert: ${QPX_UPSTREAM_CLIENT_CERT:-/etc/qpx/upstream/client.crt}
      client_key: ${QPX_UPSTREAM_CLIENT_KEY:-/etc/qpx/upstream/client.key}
    http:
      response_rules:
      - name: bypass-cache-for-errors
        match:
          response_status:
          - 500-599
        effects:
          cache:
            bypass: true
      - name: tag-partner-mtls
        match:
          client_cert:
            present: true
            issuer:
            - '*Corp*'
        effects:
          headers:
            response_add:
              X-Client-Cert: present
      - name: annotate-json
        match:
          headers:
          - name: content-type
            regex: ^application/json
          response_size:
          - 0-1048576
          upstream_cert:
            present: true
            san_dns:
            - app.internal.example.com
        effects:
          headers:
            response_add:
              X-Proxy-Policy: response-rule
          tags:
          - upstream-cert-ok
      - name: grpc-maintenance
        match:
          rpc:
            protocol:
            - grpc
            service:
            - demo.Echo
            method:
            - Say
            status:
            - '14'
        effects:
          local_response:
            rpc:
              protocol: grpc
              status: '14'
              message: maintenance
            headers:
              X-QPX-RPC-Policy: grpc-maintenance
          retry:
            suppress: true
          tags:
          - grpc-unavailable
    health_check:
      interval_ms: 5000
      timeout_ms: 1000
      fail_threshold: 3
      cooldown_ms: 30000
      http:
        path: /healthz
        method: GET
        expected_status:
        - 200
        - 204
    http_modules:
    - type: response_compression
      id: reverse-compress
      order: 50
      min_body_bytes: 1024
      max_body_bytes: 1048576
      content_types:
      - application/json
      - text/plain
      gzip: true
      brotli: true
      zstd: false
      gzip_level: 6
      brotli_level: 5
    upstreams:
    - site-app-a
    - site-app-b
listeners:
- name: forward
  listen: 127.0.0.1:8080
  default_action:
    type: block
  destination_resolution:
    precedence:
    - sni
    - host
    - cert
    - ip
    - tls_fingerprint
    - heuristic
  http_guard_profile: strict-json-api
  connection_filter:
  - name: drop-known-scanner-net
    match:
      src_ip:
      - 198.51.100.0/24
      dst_port:
      - 8080
    action:
      type: block
  tls_inspection:
    enabled: true
    verify_upstream: true
    verify_exceptions:
    - '*.internal.example.com'
    upstream_trust_profile: corp-issued
    upstream_trust:
      san_dns:
      - '*.internal.example.com'
  rules:
  - name: block-ads-with-local-page
    match:
      src_ip:
      - 127.0.0.1/32
      - ::1/128
      host:
      - '*.doubleclick.net'
      - '*.googlesyndication.com'
    action:
      type: respond
      local_response:
        status: 403
        content_type: text/plain; charset=utf-8
        body: blocked by qpx policy
        headers:
          X-Policy: adblock
  - name: corp-allow
    match:
      src_ip:
      - 10.0.0.0/8
      host:
      - '*.example.com'
      method:
      - GET
      - CONNECT
    auth:
      require:
      - ldap
      groups:
      - dev
      - ops
    action:
      type: inspect
    headers:
      request_set:
        X-Proxy: qpx
      request_regex_replace:
      - header: User-Agent
        pattern: Foo
        replace: Bar
  - name: inspect-ai-saas
    match:
      destination:
        category:
          value:
          - ai
          source:
          - host
          confidence:
          - '>=80'
        application:
          value:
          - chrome
          source:
          - heuristic
          confidence:
          - '40'
      scheme:
      - https
      http_version:
      - HTTP/2
      - HTTP/3
      alpn:
      - h2
      - h3
      tls_version:
      - tls1.3
      tls_fingerprint:
        ja4:
        - t13dh2_03_05_02
    action:
      type: inspect
  - name: local-large-upload-preview
    match:
      src_ip:
      - 127.0.0.1/32
      - ::1/128
      host:
      - uploads.example.com
      method:
      - POST
      - PUT
      request_size:
      - '>=1M'
    action:
      type: respond
      local_response:
        status: 413
        content_type: text/plain; charset=utf-8
        body: upload preview over size limit
  - name: allow-loopback
    match:
      src_ip:
      - 127.0.0.1/32
      - ::1/128
      host:
      - '*'
    action:
      type: direct
  http:
    response_rules:
    - name: annotate-ai-saas-response
      match:
        destination:
          category:
            value:
            - ai
            source:
            - host
            confidence:
            - '>=80'
          application:
            value:
            - chrome
            source:
            - heuristic
            confidence:
            - '40'
        scheme:
        - https
        http_version:
        - HTTP/2
        - HTTP/3
        alpn:
        - h2
        - h3
        tls_version:
        - tls1.3
        tls_fingerprint:
          ja4:
          - t13dh2_03_05_02
      effects:
        retry:
          suppress: true
        tags:
        - ai-saas
  # Choose the HTTP/3 backend by expected traffic:
  # - http3-backend-h3: CONNECT-UDP / MASQUE datagram relay and generic
  #   extended CONNECT on the upstream-h3 backend
  # - http3-backend-qpx: clean-room backend for CONNECT-UDP / MASQUE,
  #   generic extended CONNECT, and WebTransport relay
  http3:
    enabled: true
    listen: 127.0.0.1:8443
    connect_udp:
      enabled: true
      idle_timeout_secs: 30
      max_capsule_buffer_bytes: 262144
  ftp:
    max_request_body_bytes: 8388608
    max_download_bytes: 67108864
  xdp:
    enabled: false
    metadata_mode: proxy-v2
    require_metadata: true
    trusted_peers:
    - 127.0.0.1/32
  rate_limit:
    enabled: true
    key: src_ip
    requests:
      rps: 200
      burst: 400
    sessions:
      max_concurrency: 64
  cache:
    enabled: true
    backend: edge-cache
    namespace: forward-main
    default_ttl_secs: 120
    max_object_bytes: 2097152
  http_modules:
  - type: cache_purge
    id: forward-cache-purge
    order: -100
    methods:
    - PURGE
    response_status: 202
    response_body: purge scheduled
    response_headers:
      X-Cache-Purge: queued
  - type: subrequest
    id: preflight-authz
    order: -20
    name: preflight-authz
    phase: request_headers
    url: http://127.0.0.1:19091/check?path={request.path}
    method: POST
    timeout_ms: 250
    pass_headers:
    - authorization
    - x-request-id
    request_headers:
      X-Module: authz
    copy_response_headers_to_request:
    - from: x-authz-user
      to: x-authenticated-user
    copy_response_headers_to_response:
    - from: x-authz-policy
      to: x-policy
    response_mode: return_on_error
  - type: response_compression
    id: forward-compress
    order: 50
    min_body_bytes: 1024
    max_body_bytes: 1048576
    content_types:
    - application/json
    - text/plain
    gzip: true
    brotli: true
    zstd: false
    gzip_level: 6
    brotli_level: 5
  mode: forward
- name: transparent
  listen: 127.0.0.1:15001
  default_action:
    type: block
  rules:
  - name: allow-loopback-web
    match:
      src_ip:
      - 127.0.0.1/32
      - ::1/128
      dst_port:
      - 80
      - 443
      host:
      - '*'
    action:
      type: direct
  mode: transparent
upstreams:
- name: corp-proxy
  url: https://proxy.example.com:3129
  tls_trust_profile: corp-pinned-proxy
  tls_trust:
    san_dns:
    - proxy.example.com
  discovery:
    kind: dns
    name: proxy.example.com
    port: 3129
    interval_ms: 5000
  resilience:
    outlier_detection:
      consecutive_failures:
        connect_errors: 2
        timeouts: 2
        resets: 1
    ejection:
      max_ms: 30000
    max_upstream_concurrency: 128
- name: site-app-a
  url: https://app-a.internal.example.com:8443
  tls_trust_profile: corp-issued
  tls_trust:
    san_dns:
    - app.internal.example.com
  discovery:
    kind: dns
    name: app-a.internal.example.com
    port: 8443
    interval_ms: 5000
  resilience:
    outlier_detection:
      consecutive_failures:
        http_5xx: 3
        timeouts: 2
      latency:
        p95_ms: 1500
    ejection:
      max_ms: 30000
    max_upstream_concurrency: 256
- name: site-app-b
  url: https://app-b.internal.example.com:8443
  tls_trust_profile: corp-issued
  tls_trust:
    san_dns:
    - app.internal.example.com
  discovery:
    kind: dns
    name: app-b.internal.example.com
    port: 8443
    interval_ms: 5000
  resilience:
    outlier_detection:
      consecutive_failures:
        http_5xx: 3
        timeouts: 2
      latency:
        p95_ms: 1500
    ejection:
      max_ms: 30000
    max_upstream_concurrency: 256
system_log:
  level: info
  format: json
access_log:
  enabled: false
  path: ${QPX_ACCESS_LOG_PATH:-~/.local/share/qpx/access.log}
  format: json
  rotation: daily
  rotation_count: 30
  exclude:
  - /health
  - /metrics
audit_log:
  enabled: false
  path: ${QPX_AUDIT_LOG_PATH:-~/.local/share/qpx/audit.log}
  format: json
  rotation: daily
  rotation_count: 365
  include:
  - subject
  - groups
  - device_id
  - posture
  - auth_strength
  - idp
  - identity_source
  - ext_authz_policy_id
  - matched_rule
  - matched_route
metrics:
  listen: 127.0.0.1:9900
  path: /metrics
  max_concurrent_connections: 32
otel:
  enabled: false
  endpoint: http://127.0.0.1:4317
  protocol: grpc
  level: info
  sample_percent: 100
  headers:
    Authorization: Bearer ${QPX_OTEL_TOKEN:-change-me}
  service_name: qpxd
# Built-in auth stays intentionally minimal here.
# For enterprise deployments, prefer identity_sources + ext_authz below.
auth:
  users:
  - username: localuser@example.invalid
    password: change-me
  - username: digestonly@example.invalid
    # SHA-256 HA1 for realm "qpx"; useful when you do not want to store a cleartext password.
    ha1: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
identity_sources:
- name: corp-access-proxy
  type: trusted_headers
  from:
    trusted_peers:
    - 10.0.0.0/8
  headers:
    user: x-authenticated-user
    groups: x-authenticated-groups
    device_id: x-device-id
    posture: x-device-posture
    auth_strength: x-auth-strength
    idp: x-idp
  strip_from_untrusted: true
- name: corp-gateway-mtls
  type: mtls_subject
  from:
    client_ca: /etc/qpx/client-ca.pem
  map:
    user_from_san_uri_prefix: spiffe://corp.example/user/
    user_from_subject_cn: true
    auth_strength: mTLS
    idp: corp-gateway
- name: edge-jwt
  type: signed_assertion
  strip_from_untrusted: true
  assertion:
    header: x-verified-jwt
    prefix: 'Bearer '
    algorithms:
    - HS256
    issuer: https://idp.example.com
    audience: qpx
    secret_env: EDGE_JWT_HMAC_SECRET
    claims:
      user_from_sub: true
      groups: groups
      device_id: device_id
      tenant: tenant
      auth_strength: acr
      idp: iss
      groups_separator: ','
ext_authz:
- name: central-policy
  endpoint: http://127.0.0.1:18080/check
  timeout_ms: 300
  max_response_bytes: 1048576
  send:
    request: true
    identity: true
    selected_headers:
    - user-agent
    - content-type
  on_error: deny
named_sets:
- name: category:ai
  type: domain
  values:
  - '*.openai.com'
  - '*.anthropic.com'
- name: reputation:suspicious
  type: cidr
  values:
  - 203.0.113.0/24
- name: application:chrome
  type: string
  values:
  - ja4-chrome
  - chrome
  - h2
- name: category:corp
  type: regex
  values:
  - (^|\.)corp\.example$
rate_limit_profiles:
- name: subject-burst
  enabled: true
  key: user
  requests:
    rps: 40
    burst: 80
  sessions:
    max_concurrency: 16
- name: tenant-daily
  enabled: true
  key: tenant
  requests:
    quota:
      interval_secs: 86400
      amount: 250000
upstream_trust_profiles:
- name: corp-issued
  issuer:
  - Corp Issuer
  san_dns:
  - '*.internal.example.com'
  - proxy.example.com
  client_cert: ${QPX_UPSTREAM_CLIENT_CERT:-/etc/qpx/upstream/client.crt}
  client_key: ${QPX_UPSTREAM_CLIENT_KEY:-/etc/qpx/upstream/client.key}
- name: corp-pinned-proxy
  pin_sha256:
  - 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
cache:
  backends:
  - name: edge-cache
    kind: redis
    endpoint: redis://127.0.0.1:6379/0
    timeout_ms: 1200
    max_object_bytes: 2097152
